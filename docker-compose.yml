services:
  # --- DEINE VIDEO FACTORY (DIE LOGIK) ---
  app:
    build: .
    container_name: viral_video_factory
    volumes:
      - .:/app
      - ./secrets:/app/secrets
      - ./data:/app/data
      - ./.env:/app/.env
      - ./output:/app/output
    environment:
      - TZ=Europe/Berlin
      - PYTHONUNBUFFERED=1
    depends_on:
      ai-master:
        condition: service_healthy
    networks:
      - caddy-net
    restart: unless-stopped

  ai-master:
    build: ./ai_service
    container_name: rtxXX90_ai_director
    ports:
      - "8800:8800"
    volumes:
      - ./huggingface:/models
      - ./secrets:/app/secrets
      - ./.env:/app/.env
    environment:
      - TZ=Europe/Berlin
      - HF_TOKEN=${HF_TOKEN} # Dein HuggingFace Token für Gemma & LTX
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    shm_size: '2gb' 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # LTX-2.3 braucht Zeit zum Initialisieren
    restart: unless-stopped
    networks:
      - caddy-net

networks:
  caddy-net:
    external: true