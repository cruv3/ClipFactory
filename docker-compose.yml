services:
  # ==========================================
  # 1. DEINE VIDEO FACTORY (DIE HAUPT-APP)
  # ==========================================
  app:
    build: ./main_service
    container_name: main_service
    volumes:
      - ./main_service:/app
      - ./secrets:/app/secrets
      - ./data:/app/data        # Hier landen alle fertigen Videos und Audios
      - ./.env:/app/.env
    environment:
      - TZ=Europe/Berlin
      - PYTHONUNBUFFERED=1
    depends_on:
      ai-llm:
        condition: service_healthy
      ai-tts:
        condition: service_healthy
      ai-video:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - caddy-net

  # ==========================================
  # 2. KI-SERVICE: LLM (OLLAMA) - Port 8801
  # ==========================================
  ai-llm:
    image: ollama/ollama:latest
    container_name: ai_llm_director
    ports:
      - "8801:11434"            # Host-Port 8801 mappt auf Ollamas internen 11434
    volumes:
      - ./ollama_data:/root/.ollama  # Ollamas eigener, effizienter Model-Cache
    environment:
      - TZ=Europe/Berlin
      - OLLAMA_KEEP_ALIVE=0     # (Optional) Zwingt Ollama, den VRAM nach Generierung sofort zu leeren!
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"] # Ollama Root Healthcheck
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - caddy-net

  # ==========================================
  # 3. KI-SERVICE: TTS (Kokoro) - Port 8802
  # ==========================================
  ai-tts:
    # Das fertige, offizielle GPU-Image (zieht alle Modelle automatisch)
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: ai_tts_director
    ports:
      - "8802:8880"             # Host 8802 mappt auf Kokoros internen Port 8880
    volumes:
      # Kokoro speichert interne Modelldaten in /app/api/voices und /app/api/models
      # Optional: Du kannst ./data mappen, wenn Kokoro Dateien lokal speichern soll
      - ./data:/app/data        
    environment:
      - TZ=Europe/Berlin
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - caddy-net

  # ==========================================
  # 4. KI-SERVICE: VIDEO (LTX-2.3) - Port 8803
  # ==========================================
  ai-video:
    build: ./ai_service_ltx
    container_name: ai_video_director
    ports:
      - "8803:8800"             # Host-Port 8803 mappt auf internen Port 8800
    volumes:
      - ./ai_service_ltx:/app
      - ./huggingface:/models   # Cache für die Video-Weights
      - ./data:/app/data        # Speichert die .mp4 Dateien direkt hier ab
      - ./.env:/app/.env
    environment:
      - TZ=Europe/Berlin
      - HF_TOKEN=${HF_TOKEN}
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'             # Mehr Shared Memory für den massiven Video-Renderprozess
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s         # Video-Modell braucht beim ersten Mal länger
    restart: unless-stopped
    networks:
      - caddy-net

networks:
  caddy-net:
    external: true