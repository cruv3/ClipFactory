services:
  # --- DEINE VIDEO FACTORY ---
  app:
    build: .
    container_name: viral_video_factory
    restart: unless-stopped
    volumes:
      - .:/app
      - ./secrets:/app/secrets
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - TZ=Europe/Berlin
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
      - kokoro
    networks:
      - caddy-net

  # --- OLLAMA (KI TEXT) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    volumes:
      - /home/server/ClipFactory/ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - caddy-net

  # --- KOKORO (KI VOICE) ---
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: kokoro
    ports:
      - "8880:8880"
    volumes:
      - /home/server/ClipFactory/kokoro_model:/app/model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/web/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - caddy-net
    

networks:
  caddy-net:
    external: true